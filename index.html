<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Now watching</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #222;
    background: #fff;
    line-height: 1.6;
    max-width: 540px;
    margin: 64px auto;
    padding: 0 20px;
  }
  h1 { font-size: 22px; margin: 0 0 24px; }
  h2 { font-size: 15px; color: #666; margin: 40px 0 12px; font-weight: 600; }
  #now { font-size: 28px; font-weight: 700; margin: 0 0 6px; }
  .last { color: #555; margin: 0; }
  ul { margin: 0; padding: 0; list-style: none; }
  li { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
  li .when { color: #999; }
  .muted { color: #999; }
</style>
</head>
<body>

<h1>Now watching</h1>

<p id="now">Loading...</p>
<p class="last">Last watched: <span id="last">-</span></p>

<h2 id="year-heading">Watched this year</h2>
<ul id="list"></ul>

<script>
function fmtDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric" });
}

function render(data) {
  const now = document.getElementById("now");
  const nw = data.now_watching;

  if (nw && nw.title) {
    now.textContent = nw.title;
  } else {
    now.innerHTML = '<span class="muted">Nothing right now</span>';
  }

  const lw = data.last_watched;
  document.getElementById("last").textContent =
    lw && lw.title ? lw.title + " (" + fmtDate(lw.finished_at) + ")" : "-";

  const year = new Date().getFullYear();
  const watched = Array.isArray(data.watched) ? data.watched : [];
  const yearOf = w => (w.finished_at ? new Date(w.finished_at).getFullYear() : w.year);
  const thisYear = watched.filter(w => yearOf(w) === year);
  document.getElementById("year-heading").textContent =
    "Watched in " + year + " (" + thisYear.length + ")";

  const list = document.getElementById("list");
  list.innerHTML = "";
  if (thisYear.length === 0) {
    list.innerHTML = '<li class="muted">Nothing logged yet</li>';
  } else {
    thisYear.slice().reverse().forEach(w => {
      const li = document.createElement("li");
      const t = document.createElement("span");
      t.textContent = w.title;
      const when = document.createElement("span");
      when.className = "when";
      when.textContent = w.finished_at ? fmtDate(w.finished_at) : "";
      li.appendChild(t);
      li.appendChild(when);
      list.appendChild(li);
    });
  }
}

async function load() {
  try {
    const res = await fetch("data.json?t=" + Date.now(), { cache: "no-store" });
    render(await res.json());
  } catch (e) {
    document.getElementById("now").textContent = "Could not load data.";
  }
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
