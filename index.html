<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Now watching</title>
<style>
  :root {
    --bg: #0d0f14;
    --panel: #161a22;
    --line: #262c38;
    --text: #e8eaf0;
    --dim: #8a93a6;
    --accent: #ff5c5c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { width: 100%; max-width: 640px; }

  .banner {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px 28px 24px;
  }
  .kicker {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(255,92,92,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,92,92,0.55); }
    70%  { box-shadow: 0 0 0 10px rgba(255,92,92,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,92,92,0); }
  }
  .title {
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    margin: 14px 0 6px;
  }
  .meta { color: var(--dim); font-size: 14px; }

  .idle .kicker { color: var(--dim); }
  .idle .dot { background: var(--dim); animation: none; }

  .footer {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    gap: 16px;
    font-size: 14px;
    color: var(--dim);
  }
  .footer b { color: var(--text); font-weight: 700; }

  details.year { margin-top: 14px; }
  details.year > summary {
    cursor: pointer;
    color: var(--dim);
    font-size: 13px;
    list-style: none;
  }
  details.year > summary::-webkit-details-marker { display: none; }
  details.year > summary:hover { color: var(--text); }
  ol.list {
    margin: 12px 0 0;
    padding-left: 22px;
    color: var(--text);
  }
  ol.list li { margin: 2px 0; }
  ol.list .when { color: var(--dim); font-size: 12px; }
  .empty { color: var(--dim); font-style: italic; }
</style>
</head>
<body>
  <div class="wrap">
    <div id="banner" class="banner idle">
      <div class="kicker"><span class="dot"></span><span id="kicker">Loading</span></div>
      <div class="title" id="title">&hellip;</div>
      <div class="meta" id="meta"></div>

      <div class="footer">
        <span>Last watched: <b id="last">&mdash;</b></span>
        <span><b id="count">0</b> this year</span>
      </div>

      <details class="year">
        <summary id="year-summary">This year's list</summary>
        <ol class="list" id="year-list"></ol>
      </details>
    </div>
  </div>

<script>
const WATCH_HOURS = 3;
let data = null;

function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}

function fmtRemaining(ms) {
  if (ms <= 0) return "wrapping up";
  const m = Math.floor(ms / 60000);
  const h = Math.floor(m / 60);
  const mm = m % 60;
  if (h > 0) return `${h}h ${mm}m left`;
  return `${mm}m left`;
}

function render() {
  if (!data) return;
  const banner = document.getElementById("banner");
  const nw = data.now_watching;

  if (nw && nw.title) {
    const started = new Date(nw.started_at).getTime();
    const ends = started + WATCH_HOURS * 3600 * 1000;
    banner.classList.remove("idle");
    document.getElementById("kicker").textContent = "Now watching";
    document.getElementById("title").textContent = nw.title;
    document.getElementById("meta").textContent = fmtRemaining(ends - Date.now());
  } else {
    banner.classList.add("idle");
    document.getElementById("kicker").textContent = "Not watching anything";
    const lw = data.last_watched;
    document.getElementById("title").textContent = lw && lw.title ? lw.title : "Nothing yet";
    document.getElementById("meta").textContent = lw && lw.title ? "the most recent one" : "";
  }

  const lw = data.last_watched;
  document.getElementById("last").textContent =
    lw && lw.title ? `${lw.title} (${fmtDate(lw.finished_at)})` : "—";

  const year = new Date().getFullYear();
  const watched = Array.isArray(data.watched) ? data.watched : [];
  const thisYear = watched.filter(w => new Date(w.finished_at).getFullYear() === year);
  document.getElementById("count").textContent = thisYear.length;
  document.getElementById("year-summary").textContent = `${year} list (${thisYear.length})`;

  const list = document.getElementById("year-list");
  list.innerHTML = "";
  if (thisYear.length === 0) {
    const li = document.createElement("li");
    li.className = "empty";
    li.textContent = "nothing logged yet";
    li.style.listStyle = "none";
    li.style.marginLeft = "-22px";
    list.appendChild(li);
  } else {
    thisYear.slice().reverse().forEach(w => {
      const li = document.createElement("li");
      li.innerHTML = `${w.title} <span class="when">&middot; ${fmtDate(w.finished_at)}</span>`;
      list.appendChild(li);
    });
  }
}

async function load() {
  try {
    const res = await fetch(`data.json?t=${Date.now()}`, { cache: "no-store" });
    data = await res.json();
    render();
  } catch (e) {
    document.getElementById("title").textContent = "Could not load data";
  }
}

load();
setInterval(render, 1000);   // live countdown
setInterval(load, 60000);    // pick up flips / new movies
</script>
</body>
</html>
